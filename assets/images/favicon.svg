<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Solid Deep Slate Background matching website's dark theme -->
  <rect width="512" height="512" rx="112" fill="#0F172A" />
  
  <!-- High-Scale Abstract Stopwatch Silhouette (Pure White, Sharp Rectangular Pushers) -->
  
  <!-- Left Sharp Pusher (rotated -45deg around watch center 256, 290) -->
  <g transform="rotate(-45 256 290)">
    <rect x="216" y="65" width="80" height="90" fill="#FFFFFF" />
  </g>
  
  <!-- Right Sharp Pusher (rotated 45deg around watch center 256, 290) -->
  <g transform="rotate(45 256 290)">
    <rect x="216" y="65" width="80" height="90" fill="#FFFFFF" />
  </g>
  
  <!-- Central Top Crown/Pusher (at 12 o'clock) -->
  <rect x="216" y="65" width="80" height="90" fill="#FFFFFF" />
  
  <!-- Main Stopwatch Face Circle -->
  <circle cx="256" cy="290" r="170" fill="#FFFFFF" />
</svg>
