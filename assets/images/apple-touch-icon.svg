<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Solid Website Deep Slate Square Background (iOS masks this dynamically) -->
  <rect width="512" height="512" fill="#0F172A" />
  
  <!-- Left Side Button (rotated -40deg) - Chunky Solid White (Wider, not taller) -->
  <g transform="rotate(-40 256 285)">
    <rect x="236" y="96" width="40" height="32" rx="8" fill="#FFFFFF" />
  </g>
  
  <!-- Right Side Button (rotated 40deg) - Chunky Solid White (Wider, not taller) -->
  <g transform="rotate(40 256 285)">
    <rect x="236" y="96" width="40" height="32" rx="8" fill="#FFFFFF" />
  </g>
  
  <!-- Top Neck & Wide Crown Button - Solid White -->
  <rect x="238" y="106" width="36" height="30" fill="#FFFFFF" />
  <rect x="206" y="70" width="100" height="36" rx="8" fill="#FFFFFF" />
  
  <!-- Main Clock Circle Body - Solid White -->
  <circle cx="256" cy="285" r="150" fill="#FFFFFF" />
  
  <!-- Silhouette Cutout Hands (Vibrant Track Red `#D9383A` from website palette) -->
  
  <!-- Main Sweep Hand pointing dynamically to ~2 o'clock (rotated 55deg) -->
  <g transform="rotate(55 256 285)">
    <rect x="246" y="150" width="20" height="135" rx="10" fill="#D9383A" />
  </g>
  
  <!-- Second Lap/Split Hand pointing to ~10:30 (rotated -35deg) -->
  <g transform="rotate(-35 256 285)">
    <rect x="249" y="170" width="14" height="115" rx="7" fill="#D9383A" />
  </g>
  
  <!-- Center Hub -->
  <circle cx="256" cy="285" r="22" fill="#D9383A" />
</svg>
